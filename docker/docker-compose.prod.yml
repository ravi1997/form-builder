version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - upload_volume:/var/www/uploads:ro
      - ../frontend/build/web:/var/www/html:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - formbuilder_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/formbuilder
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - EMAIL_API_URL=${EMAIL_API_URL}
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN}
      - SMS_API_URL=${SMS_API_URL}
      - SMS_API_TOKEN=${SMS_API_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - upload_volume:/app/uploads
      - ./backend/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - mongodb
      - redis
      - elasticsearch
      - clamav
    restart: unless-stopped
    networks:
      - formbuilder_network
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    command: celery -A app.wsgi.celery worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4} --max-tasks-per-child=1000
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/formbuilder
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - EMAIL_API_URL=${EMAIL_API_URL}
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN}
      - SMS_API_URL=${SMS_API_URL}
      - SMS_API_TOKEN=${SMS_API_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - upload_volume:/app/uploads
      - ./backend/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - mongodb
      - elasticsearch
      - clamav
    restart: unless-stopped
    networks:
      - formbuilder_network
    deploy:
      replicas: ${CELERY_WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    command: celery -A app.wsgi.celery beat --loglevel=info --scheduler=celery.beat.PersistentScheduler
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/formbuilder
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./backend/celerybeat-schedule:/app/celerybeat-schedule
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - mongodb
      - elasticsearch
    restart: unless-stopped
    networks:
      - formbuilder_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flower:
    image: celeryflower:latest
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_AUTH:-admin:admin123}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - formbuilder_network
    volumes:
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7.0
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./docker/mongodb/mongod.conf:/etc/mongod.conf:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MONGO_INITDB_DATABASE=formbuilder
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    restart: unless-stopped
    networks:
      - formbuilder_network
    command: mongod --config /etc/mongod.conf
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.0-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
      - /etc/localtime:/etc/localtime:ro
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped
    networks:
      - formbuilder_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: elasticsearch:8.11.1
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - formbuilder_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  clamav:
    image: clamav/clamav:latest
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
      - upload_volume:/scan
      - ./docker/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - formbuilder_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  clamav_data:
  upload_volume:

networks:
  formbuilder_network:
    driver: bridge